<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>優先度マトリクス</title>
<style>
:root{--bg:#EDECEA;--surface:#FFFFFF;--border:#E0DDD8;--text:#272724;--text-muted:#9A9893;--accent:#1A1A18;--q-a-bg:linear-gradient(135deg,#FFF2EE,#FDEAE3);--q-b-bg:linear-gradient(135deg,#F2F0FF,#EAE7FD);--q-c-bg:linear-gradient(135deg,#E8F8F0,#D8F2E6);--q-d-bg:linear-gradient(135deg,#F5F4F0,#ECEAE4);--chip-a-bg:#FFE2D8;--chip-a-border:#E05C32;--chip-a-text:#7A2510;--chip-b-bg:#E5E1FD;--chip-b-border:#7C73DE;--chip-b-text:#3B2E9A;--chip-c-bg:#BEEFD8;--chip-c-border:#1E9E76;--chip-c-text:#095041;--chip-d-bg:#E6E5E0;--chip-d-border:#9A9790;--chip-d-text:#4A4844;--sh-sm:0 1px 3px rgba(0,0,0,.07);--sh-md:0 4px 14px rgba(0,0,0,.09);--sh-lg:0 10px 28px rgba(0,0,0,.13);--sh-f:0 0 0 3px rgba(120,120,120,.18)}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,'Hiragino Sans','Yu Gothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--sh-sm)}.header-left{display:flex;align-items:center;gap:12px}.logo{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700}.header-title{font-size:16px;font-weight:600;letter-spacing:-.3px}.header-subtitle{font-size:12px;color:var(--text-muted);margin-top:1px}
.sync-badge{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg)}.sync-dot{width:7px;height:7px;border-radius:50%;background:#ccc;transition:background .3s}.sync-dot.ok{background:#1E9E76}.sync-dot.error{background:#E05C32}.sync-dot.loading{background:#F0A500;animation:pulse 1s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.project-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:10px}.project-label{font-size:12px;color:var(--text-muted);white-space:nowrap}.project-select{font-size:13px;font-weight:500;color:var(--text);background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:5px 10px;cursor:pointer;outline:none;min-width:160px}.btn-text{font-size:12px;color:var(--text-muted);background:none;border:1px dashed var(--border);border-radius:8px;padding:5px 12px;cursor:pointer;font-family:inherit}
.main{padding:16px 20px;max-width:1400px;margin:0 auto}.matrix-grid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:12px;height:calc(100vh - 195px);min-height:480px}
.quadrant{background:var(--surface);border-radius:16px;border:1px solid var(--border);box-shadow:var(--sh-sm);display:flex;flex-direction:column;overflow:hidden;transition:box-shadow .2s,border-color .2s}.quadrant.drag-over{box-shadow:var(--sh-md);border-color:#bbb}
.quadrant-header{padding:12px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:8px;flex-shrink:0}.quadrant-a .quadrant-header{background:var(--q-a-bg)}.quadrant-b .quadrant-header{background:var(--q-b-bg)}.quadrant-c .quadrant-header{background:var(--q-c-bg)}.quadrant-d .quadrant-header{background:var(--q-d-bg)}
.quadrant-title{font-size:13px;font-weight:700;letter-spacing:-.2px}.quadrant-desc{font-size:11px;color:var(--text-muted);margin-top:2px}.quadrant-count{font-size:20px;font-weight:700;line-height:1;min-width:28px;text-align:right}
.chip{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;border:1px solid;margin-top:4px;letter-spacing:.3px}.chip-a{background:var(--chip-a-bg);border-color:var(--chip-a-border);color:var(--chip-a-text)}.chip-b{background:var(--chip-b-bg);border-color:var(--chip-b-border);color:var(--chip-b-text)}.chip-c{background:var(--chip-c-bg);border-color:var(--chip-c-border);color:var(--chip-c-text)}.chip-d{background:var(--chip-d-bg);border-color:var(--chip-d-border);color:var(--chip-d-text)}
.task-list{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:6px}.task-list::-webkit-scrollbar{width:4px}.task-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.task-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 11px;cursor:grab;transition:all .15s;box-shadow:var(--sh-sm);user-select:none;display:flex;align-items:flex-start;gap:9px}.task-card:hover{box-shadow:var(--sh-md);transform:translateY(-1px)}.task-card:active{cursor:grabbing}.task-card.dragging{opacity:.35;transform:rotate(1.5deg) scale(1.02)}
.task-check{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px;background:var(--bg)}.task-check:hover{border-color:#999}.task-check.done{background:var(--accent);border-color:var(--accent)}.task-check.done::after{content:'';width:8px;height:5px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translate(0,-1px);display:block}
.task-body{flex:1;min-width:0}.task-text{font-size:13px;font-weight:500;line-height:1.4;word-break:break-word}.task-text.done-text{text-decoration:line-through;color:var(--text-muted)}
.task-delete{width:20px;height:20px;border-radius:6px;border:none;background:none;color:#ccc;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:0;transition:all .15s}.task-card:hover .task-delete{opacity:1}.task-delete:hover{background:#FFE2D8;color:#E05C32}
.add-task-area{padding:8px 10px;border-top:1px solid var(--border);flex-shrink:0}.add-task-input{width:100%;font-size:12px;color:var(--text);background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 10px;outline:none;font-family:inherit;resize:none;height:32px;transition:all .15s}.add-task-input:focus{border-color:#aaa;box-shadow:var(--sh-f);background:var(--surface);height:54px}.add-task-input::placeholder{color:var(--text-muted)}
.toast-container{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}.toast{background:var(--accent);color:#fff;font-size:13px;padding:10px 22px;border-radius:24px;box-shadow:var(--sh-lg);opacity:0;transform:translateY(10px);white-space:nowrap;animation:toastIn .25s forwards,toastOut .25s 2.5s forwards}@keyframes toastIn{to{opacity:1;transform:translateY(0)}}@keyframes toastOut{to{opacity:0;transform:translateY(10px)}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:all .2s}.modal-overlay.open{opacity:1;visibility:visible}.modal{background:var(--surface);border-radius:18px;padding:28px;width:340px;box-shadow:var(--sh-lg);transform:scale(.95);transition:transform .2s}.modal-overlay.open .modal{transform:scale(1)}.modal-title{font-size:16px;font-weight:700;margin-bottom:16px}.modal-input{width:100%;font-size:14px;color:var(--text);background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 14px;outline:none;font-family:inherit;margin-bottom:16px;transition:all .15s}.modal-actions{display:flex;gap:8px;justify-content:flex-end}.btn{font-size:13px;font-weight:600;padding:8px 20px;border-radius:10px;border:none;cursor:pointer;transition:all .15s;font-family:inherit}.btn-primary{background:var(--accent);color:#fff}.btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.loading-overlay{position:fixed;inset:0;background:var(--bg);z-index:300;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;transition:opacity .3s}.loading-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.loading-text{font-size:13px;color:var(--text-muted)}
@media(max-width:700px){.main{padding:10px}.matrix-grid{grid-template-columns:1fr;grid-template-rows:repeat(4,auto);height:auto}.quadrant{min-height:200px}}
</style>
</head>
<body>
<div class="loading-overlay" id="loadingOverlay"><div class="loading-spinner"></div><div class="loading-text">データを読み込み中...</div></div>
<div class="header"><div class="header-left"><div class="logo">E</div><div><div class="header-title">優先度マトリクス</div><div class="header-subtitle">有限会社栄都工業</div></div></div><div class="sync-badge"><div class="sync-dot loading" id="syncDot"></div><span id="syncLabel">接続中...</span></div></div>
<div class="project-bar"><span class="project-label">プロジェクト</span><select class="project-select" id="projectSelect" onchange="switchProject()"></select><button class="btn-text" onclick="openModal()">＋ 新規プロジェクト</button></div>
<div class="main"><div class="matrix-grid">
<div class="quadrant quadrant-a" id="q-A" ondragover="onDragOver(event,'A')" ondragleave="onDragLeave('A')" ondrop="onDrop(event,'A')"><div class="quadrant-header"><div><div class="quadrant-title">🔥 今すぐやる</div><div class="quadrant-desc">緊急かつ重要</div><span class="chip chip-a">DO FIRST</span></div><div class="quadrant-count" id="count-A">0</div></div><div class="task-list" id="list-A"></div><div class="add-task-area"><textarea class="add-task-input" placeholder="タスクを追加…(Enterで確定)" onkeydown="onKey(event,'A')"></textarea></div></div>
<div class="quadrant quadrant-b" id="q-B" ondragover="onDragOver(event,'B')" ondragleave="onDragLeave('B')" ondrop="onDrop(event,'B')"><div class="quadrant-header"><div><div class="quadrant-title">📅 計画する</div><div class="quadrant-desc">重要だが緊急でない</div><span class="chip chip-b">SCHEDULE</span></div><div class="quadrant-count" id="count-B">0</div></div><div class="task-list" id="list-B"></div><div class="add-task-area"><textarea class="add-task-input" placeholder="タスクを追加…(Enterで確定)" onkeydown="onKey(event,'B')"></textarea></div></div>
<div class="quadrant quadrant-c" id="q-C" ondragover="onDragOver(event,'C')" ondragleave="onDragLeave('C')" ondrop="onDrop(event,'C')"><div class="quadrant-header"><div><div class="quadrant-title">🤝 委託する</div><div class="quadrant-desc">緊急だが重要でない</div><span class="chip chip-c">DELEGATE</span></div><div class="quadrant-count" id="count-C">0</div></div><div class="task-list" id="list-C"></div><div class="add-task-area"><textarea class="add-task-input" placeholder="タスクを追加…(Enterで確定)" onkeydown="onKey(event,'C')"></textarea></div></div>
<div class="quadrant quadrant-d" id="q-D" ondragover="onDragOver(event,'D')" ondragleave="onDragLeave('D')" ondrop="onDrop(event,'D')"><div class="quadrant-header"><div><div class="quadrant-title">🗑️ 捨てる</div><div class="quadrant-desc">緊急でも重要でもない</div><span class="chip chip-d">ELIMINATE</span></div><div class="quadrant-count" id="count-D">0</div></div><div class="task-list" id="list-D"></div><div class="add-task-area"><textarea class="add-task-input" placeholder="タスクを追加…(Enterで確定)" onkeydown="onKey(event,'D')"></textarea></div></div>
</div></div>
<div class="toast-container" id="toastContainer"></div>
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-title">新規プロジェクト</div><input type="text" class="modal-input" id="modalInput" placeholder="プロジェクト名" onkeydown="if(event.key==='Enter')confirmModal()"><div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">キャンセル</button><button class="btn btn-primary" onclick="confirmModal()">作成</button></div></div></div>
<script>
const GAS_URL='https://script.google.com/a/macros/eito810.com/s/AKfycbx5Sg_HgOEJdGmcaKZseqr4m7q5i73X-KLRL8ARTpcNR7bFTZ5hAlCaWLZUB3miTxUOKw/exec';
const DEFAULT_DB=()=>({projects:{'共通':{A:[],B:[],C:[],D:[]}}});
let db=DEFAULT_DB(),currentProject='共通',draggingId=null,draggingFrom=null,saveTimer=null;
window.addEventListener('DOMContentLoaded',async()=>{
  try{
    setSyncStatus('loading','読込中...');
    const res=await fetch(GAS_URL);
    const json=await res.json();
    if(json.ok&&json.data&&json.data.projects&&Object.keys(json.data.projects).length>0){
      db=json.data;
    }else{
      db=DEFAULT_DB();
    }
  }catch(e){
    db=DEFAULT_DB();
    setSyncStatus('error','オフライン');
    showToast('⚠️ GAS接続失敗 - ローカルで動作中');
  }
  Object.keys(db.projects).forEach(p=>['A','B','C','D'].forEach(q=>{if(!db.projects[p][q])db.projects[p][q]=[];}));
  renderProjectSelect();
  currentProject=Object.keys(db.projects)[0];
  document.getElementById('projectSelect').value=currentProject;
  renderAll();
  setSyncStatus('ok','同期済み');
  hideLoading();
});
function scheduleSave(){clearTimeout(saveTimer);setSyncStatus('loading','保存中...');saveTimer=setTimeout(async()=>{try{await fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(db)});setSyncStatus('ok','同期済み');}catch{setSyncStatus('error','保存失敗');}},800);}
function renderProjectSelect(){document.getElementById('projectSelect').innerHTML=Object.keys(db.projects).map(n=>'<option value="'+n+'">'+n+'</option>').join('');}
function switchProject(){currentProject=document.getElementById('projectSelect').value;if(!db.projects[currentProject])db.projects[currentProject]={A:[],B:[],C:[],D:[]};renderAll();}
function openModal(){document.getElementById('modal').classList.add('open');setTimeout(()=>document.getElementById('modalInput').focus(),150);}
function closeModal(){document.getElementById('modal').classList.remove('open');document.getElementById('modalInput').value='';}
function confirmModal(){const name=document.getElementById('modalInput').value.trim();if(!name)return;if(db.projects[name]){showToast('⚠️ 同じ名前のプロジェクトがあります');return;}db.projects[name]={A:[],B:[],C:[],D:[]};renderProjectSelect();document.getElementById('projectSelect').value=name;currentProject=name;renderAll();scheduleSave();closeModal();showToast('✅ "'+name+'" 作成しました');}
function renderAll(){['A','B','C','D'].forEach(renderQ);}
function renderQ(q){const proj=db.projects[currentProject]||{};const items=proj[q]||[];document.getElementById('count-'+q).textContent=items.filter(t=>!t.done).length;document.getElementById('list-'+q).innerHTML=items.map(t=>'<div class="task-card" draggable="true" id="card-'+t.id+'" ondragstart="onDragStart(event,''+t.id+'',''+q+'')" ondragend="onDragEnd()"><div class="task-check'+(t.done?' done':'')+'" onclick="toggleDone(''+t.id+'',''+q+'')"></div><div class="task-body"><div class="task-text'+(t.done?' done-text':'')+'">'+String(t.text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div></div><button class="task-delete" onclick="deleteTask(''+t.id+'',''+q+'')" title="削除">x</button></div>').join('');}
function onKey(e,q){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();const text=e.target.value.trim();if(!text)return;e.target.value='';const proj=db.projects[currentProject];if(!proj)return;proj[q].push({id:uid(),text,done:false});renderQ(q);scheduleSave();}}
function toggleDone(id,q){const proj=db.projects[currentProject];const task=proj&&proj[q]&&proj[q].find(t=>t.id===id);if(!task)return;task.done=!task.done;renderQ(q);scheduleSave();}
function deleteTask(id,q){const proj=db.projects[currentProject];if(!proj)return;proj[q]=proj[q].filter(t=>t.id!==id);renderQ(q);scheduleSave();}
function onDragStart(e,id,q){draggingId=id;draggingFrom=q;setTimeout(()=>document.getElementById('card-'+id)?.classList.add('dragging'),0);}
function onDragEnd(){if(draggingId)document.getElementById('card-'+draggingId)?.classList.remove('dragging');draggingId=null;draggingFrom=null;['A','B','C','D'].forEach(q=>document.getElementById('q-'+q).classList.remove('drag-over'));}
function onDragOver(e,q){e.preventDefault();document.getElementById('q-'+q).classList.add('drag-over');}
function onDragLeave(q){document.getElementById('q-'+q).classList.remove('drag-over');}
function onDrop(e,toQ){e.preventDefault();onDragLeave(toQ);if(!draggingId||draggingFrom===toQ)return;const proj=db.projects[currentProject];const fromArr=proj[draggingFrom];const idx=fromArr.findIndex(t=>t.id===draggingId);if(idx===-1)return;const[task]=fromArr.splice(idx,1);proj[toQ].push(task);renderQ(draggingFrom);renderQ(toQ);draggingId=null;draggingFrom=null;scheduleSave();}
function setSyncStatus(state,label){document.getElementById('syncDot').className='sync-dot '+state;document.getElementById('syncLabel').textContent=label;}
function showToast(msg){const c=document.getElementById('toastContainer');const t=document.createElement('div');t.className='toast';t.textContent=msg;c.appendChild(t);setTimeout(()=>t.remove(),3000);}
function hideLoading(){const el=document.getElementById('loadingOverlay');el.style.opacity='0';setTimeout(()=>el.style.display='none',300);}
function uid(){return 'T'+Date.now()+Math.random().toString(36).slice(2,6);}
</script>
</body>
</html>
